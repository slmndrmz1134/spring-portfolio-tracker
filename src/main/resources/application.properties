server.port=8080

# MySQL bağlantısı
spring.datasource.url=jdbc:mysql://localhost:3306/portfoliodb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
